name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Verify formatting
        working-directory: server
        run: test -z "$(gofmt -l .)"

      - name: go vet
        working-directory: server
        run: go vet ./...

      - name: Build
        working-directory: server
        run: go build ./...

  client:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: corepack enable

      - name: Install
        working-directory: client
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: client
        run: pnpm build
