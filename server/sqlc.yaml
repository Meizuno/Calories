version: "2"
sql:
  - engine: postgresql
    # Only the *.up.sql files describe the schema (skip the down migrations).
    schema: "internal/store/migrations/*.up.sql"
    queries: "internal/store/queries"
    gen:
      go:
        package: "db"
        out: "internal/store/db"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "date"
            go_type: "time.Time"
          - db_type: "timestamptz"
            go_type: "time.Time"
